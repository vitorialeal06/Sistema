{% extends 'base.html' %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-body text-center p-5">
                    <i class="bi bi-exclamation-triangle text-danger display-1"></i>
                    <h2 class="mt-3">Tem certeza?</h2>
                    <p class="text-muted">
                        Você está prestes a excluir o veículo <strong>{{ object.modelo }}</strong>. 
                        Esta ação não pode ser desfeita.
                    </p>
                    
                    <form method="post">
                        {% csrf_token %}
                        <div class="d-grid gap-2 d-md-block">
                            <button type="submit" class="btn btn-danger px-4">
                                <i class="bi bi-trash"></i> Confirmar Exclusão
                            </button>
                            <a href="{% url 'listar-veiculos' %}" class="btn btn-secondary px-4">
                                Cancelar
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
