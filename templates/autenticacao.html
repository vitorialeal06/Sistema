<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Autenticação</title>
    
    {% load static %}
    <link rel="stylesheet" href="{% static 'bootstrap/css/bootstrap.min.css' %}">
</head>
<body>

    <main class="vh-100 gradient-custom d-flex align-items-center py-5">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-12 col-md-8 col-lg-5 col-xl-4">

                    <article class="card bg-dark text-white" style="border-radius: 3rem;">
                        <div class="card-body p-5 text-center">

                            <header class="mb-4">
                                <h1 class="fw-bold text-uppercase">Login</h1>
                                <p class="text-white-50 mb-0">Insira suas credenciais para acessar sua conta</p>
                            </header>

                            {% if mensagem %}
                                <div class="alert alert-danger" role="alert">
                                    {{ mensagem }}
                                </div>
                            {% endif %}

                            <form action="{% url 'login' %}" method="POST" novalidate>
                                {% csrf_token %}

                                <div class="mb-4">
                                    <label for="usuario" class="form-label text-white-50">Email</label>
                                    <input type="text" 
                                           id="usuario" 
                                           name="usuario" 
                                           class="form-control form-control-lg bg-dark text-white border-light"
                                           placeholder="usuario"
                                           required>
                                </div>

                                <div class="mb-4">
                                    <label for="senha" class="form-label text-white-50">Senha</label>
                                    <input type="password" 
                                           id="senha" 
                                           name="senha" 
                                           class="form-control form-control-lg bg-dark text-white border-light"
                                           placeholder="Digite sua senha"
                                           required>
                                </div>
                                

                                <div class="d-flex justify-content-end mb-4">
                                    <a href="#!" class="text-white-50 small">Esqueceu a senha?</a>
                                </div>

                                <button type="submit" class="btn btn-outline-light btn-lg w-100 mb-4">
                                    Entrar
                                </button>
                            </form>
                            
                            <footer class="mt-3">
                                <p class="mb-0 text-white-50">
                                    Não tem uma conta? 
                                    <a href="/" class="text-white fw-bold">Criar conta</a>
                                </p>
                            </footer>

                        </div>
                    </article>

                </div>
            </div>
        </div>
    </main>

</body>
</html>
